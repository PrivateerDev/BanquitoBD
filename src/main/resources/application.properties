# Base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/banquito_db
spring.datasource.username=banquito_user
spring.datasource.password=banquito2026
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Servidor PUERTO 8081
server.port=8081
spring.application.name=banquito-backend

# Deshabilitar Spring Security

# Subida de archivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.uploads.path=uploads/docs

# CORS COMPLETO - TODOS PUERTOS VITE + PATCH
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://127.0.0.1:5173
spring.web.cors.allowed-methods=GET,HEAD,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

logging.level.org.springframework.web=DEBUG

